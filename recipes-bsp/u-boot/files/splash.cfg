# Core video & console
CONFIG_VIDEO=y
CONFIG_DM_VIDEO=y
CONFIG_VIDCONSOLE=y
CONFIG_CONSOLE_MUX=y
CONFIG_SYS_WHITE_ON_BLACK=y

# Splash machinery
CONFIG_SPLASH_SCREEN=y
CONFIG_SPLASH_SCREEN_ALIGN=y
CONFIG_SPLASH_SOURCE=y        # use env: splashsource=mmc, splashfile=/boot/splash.bmp

# Bitmap + filesystem loaders
CONFIG_BMP=y
CONFIG_BMP_24BPP=y
CONFIG_BMP_32BPP=y
CONFIG_CMD_BMP=y

# Load from the boot media (FAT/EXT)
CONFIG_CMD_FS_GENERIC=y
CONFIG_CMD_FAT=y
CONFIG_FS_FAT=y
CONFIG_CMD_EXT4=y
CONFIG_FS_EXT4=y
CONFIG_MMC=y

# (Optional) PNG support instead of BMP
# CONFIG_CMD_PNG=y
# CONFIG_PNG=y
