header:
  version: 14

defaults:
  repos:
    branch: "scarthgap"

repos:

  plt-agent-os:

  poky:
    url: https://git.yoctoproject.org/poky
    commit: "cb2dcb4963e5fbe449f1bcb019eae883ddecc8ec"
    path: layers/poky
    layers:
      meta:
      meta-poky:
      meta-yocto-bsp:

  meta-openembedded:
    url: https://github.com/openembedded/meta-openembedded.git
    # scarthgap-5.0
    commit: "5124ac4a658899158f4a7a2ddf1d2ca931ec7d0e"
    path: layers/meta-openembedded
    layers:
      meta-oe:
      meta-python:
      meta-multimedia:
      meta-networking:

  meta-raspberrypi:
    url: https://git.yoctoproject.org/meta-raspberrypi
    # scarthgap-5.0
    commit: "2c646d29912dcc873469a57b1c207e1549c5094d"
    path: layers/meta-raspberrypi

  meta-rauc:
    url: https://github.com/rauc/meta-rauc.git
    commit: "d63878f20eba7a85ecf53566e7a3377e78bb46ac"
    path: layers/meta-rauc

  meta-lts-mixins:
    url: "https://git.yoctoproject.org/meta-lts-mixins"
    commit: "66ceeebd047d7fdfc8668b300319a76da8ae257d"
    path: layers/meta-lts-mixins
    branch: scarthgap/u-boot

bblayers_conf_header:
  standard: |
    CONF_VERSION = "2"
    POKY_BBLAYERS_CONF_VERSION = "2"
    #BBPATH = "${TOPDIR}"
    #BBFILES ?= ""

local_conf_header:

  diskmon: |
    BB_DISKMON_DIRS = "\
      STOPTASKS,${TMPDIR},1G,100K \
      STOPTASKS,${DL_DIR},1G,100K \
      STOPTASKS,${SSTATE_DIR},1G,100K \
      STOPTASKS,/tmp,100M,100K \
      HALT,${TMPDIR},100M,1K \
      HALT,${DL_DIR},100M,1K \
      HALT,${SSTATE_DIR},100M,1K \
      HALT,/tmp,10M,1K"

  meta-agentos: |
    # BB_HASHSERVE_UPSTREAM = "wss://hashserv.yoctoproject.org/ws"
    # SSTATE_MIRRORS ?= "file://.* http://sstate.yoctoproject.org/all/PATH;downloadfilename=PATH"
    # BB_HASHSERVE = "auto"
    # BB_SIGNATURE_HANDLER = "OEEquivHash"
    # PACKAGE_CLASSES = "package_rpm"
    SDKMACHINE = "x86_64"
    USER_CLASSES = "buildstats"
    PATCHRESOLVE = "noop"
    LICENSE_FLAGS_ACCEPTED += "synaptics-killswitch"
    PREFERRED_RPROVIDER_libnss-mdns = "avahi-libnss-mdns"
    INHIBIT_PACKAGE_DEBUG_SPLIT = "1"
    DISTRO_FEATURES:remove = "ptest debuginfod"
    # allow missing recommends to reduce image size
    PACKAGECONFIG:remove:pn-qemu-native = "sdl"
    PACKAGECONFIG:remove:pn-nativesdk-qemu = "sdl"
